name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm run lint
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

  backend-ci:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: user-service
            context: Services/UserService
          - service: race-service
            context: Services/RaceService
          - service: payment-service
            context: Services/PaymentService
          - service: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: Services/UserService
          push: true
          tags: ghcr.io/${{ github.repository }}/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push race-service
        uses: docker/build-push-action@v5
        with:
          context: Services/RaceService
          push: true
          tags: ghcr.io/${{ github.repository }}/race-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push payment-service
        uses: docker/build-push-action@v5
        with:
          context: Services/PaymentService
          push: true
          tags: ghcr.io/${{ github.repository }}/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max