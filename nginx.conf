events {}

http {
    # Docker's embedded DNS server. Using it with a variable in proxy_pass (below)
    # forces nginx to re-resolve each upstream hostname per-request instead of
    # caching the IP once at startup - otherwise nginx keeps talking to a
    # container's old IP after it's recreated, until nginx itself is restarted.
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        location /api/users/ {
            set $upstream_user http://user-service:8000;
            proxy_pass $upstream_user;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        location /api/race/ {
            set $upstream_race http://race-service:8001;
            proxy_pass $upstream_race;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        location /api/registration/ {
            set $upstream_race http://race-service:8001;
            proxy_pass $upstream_race;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }

        location /payments/ {
            set $upstream_payment http://payment-service:8002;
            proxy_pass $upstream_payment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }
    }
}
